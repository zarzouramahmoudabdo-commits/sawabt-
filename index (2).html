<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الثوابت المساحية</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1923;
    --surface: #162231;
    --surface2: #1e2f42;
    --border: #2a3f58;
    --accent: #f0a500;
    --accent2: #00bfae;
    --text: #e8edf2;
    --muted: #7a8fa3;
    --danger: #e05555;
    --success: #3dc97e;
    --font-main: 'Segoe UI', Tahoma, Arial, sans-serif;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-main);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header .icon { font-size: 1.6rem; }
  header h1 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  header h1 { flex-shrink: 0; }
  header .count {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  header .file-toolbar { margin-right: auto; }

  /* Search bar */
  .search-bar {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 1rem;
    padding: 10px 14px;
    font-family: var(--font-main);
    outline: none;
    direction: rtl;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar select {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 0.85rem;
    padding: 10px 8px;
    font-family: var(--font-main);
    outline: none;
    cursor: pointer;
  }
  .search-bar select:focus { border-color: var(--accent); }

  /* Stats strip */
  .stats {
    display: flex;
    gap: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stat {
    flex: 1;
    min-width: 80px;
    text-align: center;
    padding: 8px 4px;
    border-left: 1px solid var(--border);
  }
  .stat:last-child { border-left: none; }
  .stat .val { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

  /* Points list */
  #list {
    padding: 10px 12px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .point-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .point-card:hover { border-color: var(--accent2); }
  .point-card.editing { border-color: var(--accent); }

  .card-head {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .card-num {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
    padding: 2px 6px;
    flex-shrink: 0;
  }
  .card-desc {
    flex: 1;
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.4;
  }
  .card-desc .villa-tag {
    display: inline-block;
    background: var(--accent2);
    color: #000;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 20px;
    margin-left: 6px;
  }
  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .btn-icon {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 5px 9px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .btn-icon:hover { background: var(--border); color: var(--text); }
  .btn-icon.edit:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: var(--danger); color: var(--danger); }

  .card-coords {
    padding: 0 12px 10px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .coord-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: var(--muted);
    font-family: monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .coord-chip span { color: var(--accent2); font-weight: 700; margin-left: 3px; }

  /* Edit form */
  .edit-form {
    display: none;
    background: var(--bg);
    padding: 12px;
    border-top: 1px solid var(--border);
    gap: 10px;
    flex-direction: column;
  }
  .edit-form.open { display: flex; }
  .edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .edit-row label {
    font-size: 0.78rem;
    color: var(--muted);
    min-width: 50px;
    text-align: right;
  }
  .edit-row input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 0.92rem;
    padding: 8px 10px;
    font-family: var(--font-main);
    outline: none;
    direction: rtl;
  }
  .edit-row input:focus { border-color: var(--accent); }
  .edit-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn {
    padding: 8px 18px;
    border-radius: 7px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: var(--font-main);
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-save { background: var(--accent); color: #000; }
  .btn-cancel { background: var(--surface2); color: var(--muted); }

  /* Add new */
  .add-section {
    padding: 12px;
    background: var(--surface);
    border-top: 2px solid var(--border);
    position: sticky;
    bottom: 0;
  }
  .add-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--accent);
    color: #000;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 11px;
    border-radius: var(--radius);
    cursor: pointer;
    border: none;
    width: 100%;
    font-family: var(--font-main);
    transition: opacity 0.2s;
  }
  .add-toggle:hover { opacity: 0.88; }
  .add-form {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 12px;
  }
  .add-form.open { display: flex; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .empty .em-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: #000;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 22px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Copy coord */
  .copy-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    padding: 0 12px 8px;
  }

  @media (max-width: 480px) {
    header h1 { font-size: 1rem; }
    .card-desc { font-size: 0.88rem; }
  }

  .save-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--danger);
    color: #fff;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 7px 10px;
    z-index: 200;
    display: none;
  }
  .save-banner.show { display: block; }

  .file-toolbar {
    display: flex;
    flex-direction: row;
    gap: 6px;
    margin-right: auto;
    align-items: center;
  }
  .file-toolbar button {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 11px;
    font-size: 0.75rem;
    font-family: var(--font-main);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .file-toolbar button:hover { border-color: var(--accent2); color: var(--accent2); }
  .file-toolbar button.primary {
    background: var(--accent);
    color: #000;
    font-weight: 700;
    border-color: var(--accent);
  }
  .file-toolbar button.primary:hover { opacity: 0.85; color: #000; border-color: var(--accent); }
  .file-input { display: none; }
</style>
</head>

<script>
// ── Data persistence ───────────────────────────────────────────────────
const STORAGE_KEY = 'survey_points_v1';
let dirty = false;

function loadPoints() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) return parsed;
    } catch (e) {}
  }
  const storeEl = document.getElementById('dataStore');
  if (storeEl && storeEl.textContent.trim()) {
    try {
      const embedded = JSON.parse(storeEl.textContent);
      if (Array.isArray(embedded) && embedded.length) return embedded;
    } catch (e) {}
  }
  return [];
}

function savePoints() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(points));
  dirty = true;
  document.getElementById('saveBanner').classList.add('show');
}

// ── Data ──────────────────────────────────────────────────────────────
let points = loadPoints();

// ── Helpers ───────────────────────────────────────────────────────────
function extractVilla(desc) {
  const m = desc.match(/فيلا\s*([\d.]+)/);
  return m ? m[1] : null;
}

function highlightMatch(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark style="background:#f0a500;color:#000;border-radius:3px;padding:0 2px">$1</mark>');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Render ────────────────────────────────────────────────────────────
function render(filtered) {
  const list = document.getElementById('list');
  const q = document.getElementById('search').value.trim();

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><div class="em-icon">🔍</div>مفيش نتايج للبحث ده</div>`;
  } else {
    list.innerHTML = filtered.map(p => {
      const villa = extractVilla(p.desc);
      const villaTag = villa ? `<span class="villa-tag">فيلا ${villa}</span>` : '';
      const hlDesc = highlightMatch(p.desc, q);
      return `
      <div class="point-card" id="card-${p.num}">
        <div class="card-head" onclick="toggleCoords(${p.num})">
          <div class="card-num">${p.num}</div>
          <div class="card-desc">${hlDesc}${villaTag}</div>
          <div class="card-actions">
            <button class="btn-icon edit" onclick="startEdit(event,${p.num})" title="تعديل">✏️</button>
            <button class="btn-icon del"  onclick="deletePoint(event,${p.num})" title="حذف">🗑️</button>
          </div>
        </div>
        <div class="card-coords" id="coords-${p.num}" style="display:none">
          <div class="coord-chip" onclick="copyText('${p.E}')"><span>E</span>${p.E}</div>
          <div class="coord-chip" onclick="copyText('${p.N}')"><span>N</span>${p.N}</div>
        </div>
        <div class="edit-form" id="edit-${p.num}">
          <div class="edit-row"><label>رقم</label><input id="ef-num-${p.num}" type="number" value="${p.num}" min="1"></div>
          <div class="edit-row"><label>E</label><input id="ef-e-${p.num}" type="number" value="${p.E}" step="0.001"></div>
          <div class="edit-row"><label>N</label><input id="ef-n-${p.num}" type="number" value="${p.N}" step="0.001"></div>
          <div class="edit-row"><label>وصف</label><input id="ef-d-${p.num}" type="text" value="${p.desc}"></div>
          <div class="edit-btns">
            <button class="btn btn-cancel" onclick="cancelEdit(${p.num})">إلغاء</button>
            <button class="btn btn-save" onclick="saveEdit(${p.num})">حفظ</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Update stats
  document.getElementById('shown-count').textContent = filtered.length;
  document.getElementById('total-count').textContent = points.length;
  document.getElementById('total-stat').textContent = points.length;

  const allE = points.map(p=>p.E);
  const allN = points.map(p=>p.N);
  const eMin = Math.min(...allE).toFixed(0);
  const eMax = Math.max(...allE).toFixed(0);
  const nMin = Math.min(...allN).toFixed(0);
  const nMax = Math.max(...allN).toFixed(0);
  document.getElementById('e-range').textContent = `${eMin}–${eMax}`;
  document.getElementById('n-range').textContent = `${nMin}–${nMax}`;
}

function filterPoints() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sort = document.getElementById('sort-select').value;

  let filtered = points.filter(p => {
    if (!q) return true;
    return (
      p.num.toString().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.E.toString().includes(q) ||
      p.N.toString().includes(q)
    );
  });

  filtered.sort((a,b) => {
    if (sort === 'num') return a.num - b.num;
    if (sort === 'e')   return a.E - b.E;
    if (sort === 'n')   return a.N - b.N;
    if (sort === 'desc') return a.desc.localeCompare(b.desc, 'ar');
    return 0;
  });

  render(filtered);
}

// ── Interactions ──────────────────────────────────────────────────────
function toggleCoords(num) {
  const c = document.getElementById(`coords-${num}`);
  c.style.display = c.style.display === 'none' ? 'flex' : 'none';
}

function startEdit(e, num) {
  e.stopPropagation();
  document.querySelectorAll('.edit-form').forEach(f => f.classList.remove('open'));
  const form = document.getElementById(`edit-${num}`);
  form.classList.add('open');
  document.getElementById(`card-${num}`).classList.add('editing');
  document.getElementById(`edit-${num}`).scrollIntoView({behavior:'smooth', block:'nearest'});
}

function cancelEdit(num) {
  document.getElementById(`edit-${num}`).classList.remove('open');
  document.getElementById(`card-${num}`).classList.remove('editing');
}

function saveEdit(num) {
  const newNum = parseInt(document.getElementById(`ef-num-${num}`).value);
  const newE   = parseFloat(document.getElementById(`ef-e-${num}`).value);
  const newN   = parseFloat(document.getElementById(`ef-n-${num}`).value);
  const newD   = document.getElementById(`ef-d-${num}`).value.trim();

  if (!newD || isNaN(newE) || isNaN(newN) || isNaN(newNum)) {
    alert('تأكد من ملء كل الحقول صح'); return;
  }
  const idx = points.findIndex(p => p.num === num);
  if (idx >= 0) {
    points[idx] = {num: newNum, E: newE, N: newN, desc: newD};
  }
  savePoints();
  filterPoints();
  showToast('تم التعديل ✓');
}

function deletePoint(e, num) {
  e.stopPropagation();
  if (!confirm(`هتحذف الثابتة رقم ${num}؟`)) return;
  points = points.filter(p => p.num !== num);
  savePoints();
  filterPoints();
  showToast('تم الحذف');
}

function toggleAddForm() {
  const form = document.getElementById('add-form');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    document.getElementById('new-num').focus();
    // Suggest next number
    const maxNum = points.length ? Math.max(...points.map(p=>p.num)) : 0;
    document.getElementById('new-num').value = maxNum + 1;
  }
}

function addPoint() {
  const num  = parseInt(document.getElementById('new-num').value);
  const E    = parseFloat(document.getElementById('new-e').value);
  const N    = parseFloat(document.getElementById('new-n').value);
  const desc = document.getElementById('new-desc').value.trim();

  if (!desc || isNaN(E) || isNaN(N) || isNaN(num)) {
    alert('تأكد من ملء كل الحقول صح'); return;
  }
  if (points.find(p => p.num === num)) {
    if (!confirm(`الرقم ${num} موجود بالفعل، هتضيف رقم تاني؟`)) return;
  }

  points.push({num, E, N, desc});
  points.sort((a,b) => a.num - b.num);
  savePoints();

  // Clear form
  ['new-num','new-e','new-n','new-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('add-form').classList.remove('open');

  filterPoints();
  showToast('تمت الإضافة ✓');

  // Scroll to new card after render
  setTimeout(() => {
    const el = document.getElementById(`card-${num}`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function copyText(val) {
  navigator.clipboard.writeText(val).then(() => showToast(`نسخت: ${val}`)).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = val; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(`نسخت: ${val}`);
  });
}

// ── Save / Import to file ───────────────────────────────────────────────
function downloadUpdatedFile() {
  // 1) Update the embedded dataStore with ALL points (not just rendered ones)
  const storeEl = document.getElementById('dataStore');
  storeEl.textContent = JSON.stringify(points);

  // 2) Clean up any open UI state before capturing HTML
  document.getElementById('saveBanner').classList.remove('show');
  document.querySelectorAll('.edit-form.open').forEach(f => f.classList.remove('open'));
  document.querySelectorAll('.point-card.editing').forEach(c => c.classList.remove('editing'));
  document.getElementById('add-form').classList.remove('open');
  document.getElementById('toast').classList.remove('show');

  // 3) Reset search/filter so the #list shows all points in the saved HTML
  const searchEl = document.getElementById('search');
  const savedSearch = searchEl.value;
  searchEl.value = '';
  filterPoints(); // render all points into #list

  // 4) Capture the full HTML
  const htmlContent = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;

  // 5) Restore the user's search state
  searchEl.value = savedSearch;
  filterPoints();

  const blob = new Blob([htmlContent], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ثوابت_المساحية.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  dirty = false;
  showToast('✅ تم تنزيل الملف بكل البيانات (' + points.length + ' ثابتة)');
}

function importPoints(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      let parsed;
      const text = e.target.result;
      if (file.name.endsWith('.json')) {
        parsed = JSON.parse(text);
      } else {
        const match = text.match(/<script type="application\/json" id="dataStore">([\s\S]*?)<\/script>/);
        if (!match || !match[1].trim()) throw new Error('no data found');
        parsed = JSON.parse(match[1]);
      }
      if (!Array.isArray(parsed)) throw new Error('bad format');
      points = parsed.map(p => ({
        num: parseInt(p.num),
        E: parseFloat(p.E),
        N: parseFloat(p.N),
        desc: String(p.desc)
      }));
      savePoints();
      filterPoints();
      showToast('تم استيراد البيانات بنجاح');
    } catch (err) {
      showToast('ملف غير صالح');
    }
  };
  reader.readAsText(file);
}

document.getElementById('saveFileBtn').addEventListener('click', downloadUpdatedFile);
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files[0]) importPoints(e.target.files[0]);
  e.target.value = '';
});

// ── Init ──────────────────────────────────────────────────────────────
filterPoints();
</script>
